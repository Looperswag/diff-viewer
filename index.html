<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>代码 / 提示词对比工具</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --border-light: #21262d;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --added-bg: rgba(46, 160, 67, 0.15);
    --added-num-bg: rgba(46, 160, 67, 0.30);
    --added-word: rgba(46, 160, 67, 0.45);
    --added-color: #3fb950;
    --removed-bg: rgba(248, 81, 73, 0.15);
    --removed-num-bg: rgba(248, 81, 73, 0.30);
    --removed-word: rgba(248, 81, 73, 0.45);
    --removed-color: #f85149;
    --accent: #2f81f7;
    --accent-hover: #1f6feb;
    --empty-bg: rgba(110, 118, 129, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    flex-shrink: 0;
  }

  header h1 { font-size: 17px; font-weight: 600; }
  header .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .header-flex {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-titles { flex: 1; min-width: 0; }

  .sidebar-toggle {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .sidebar-toggle:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .app-body {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  .sidebar {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--bg-secondary);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.2s ease, border-right-width 0.2s ease;
  }
  body.sidebar-collapsed .sidebar {
    width: 0;
    border-right-width: 0;
  }

  .sidebar-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    gap: 8px;
  }
  .sidebar-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .sidebar-count {
    color: var(--text-muted);
    font-weight: normal;
    font-size: 11px;
    margin-left: 4px;
  }

  .clear-history-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .clear-history-btn:hover {
    color: var(--removed-color);
    border-color: var(--removed-color);
  }

  .sidebar-toolbar {
    padding: 8px 10px 4px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-bottom: 1px solid var(--border-light);
    flex-shrink: 0;
  }
  .new-group-btn {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    font-family: inherit;
  }
  .new-group-btn:hover {
    border-style: solid;
    border-color: var(--accent);
    color: var(--accent);
  }
  .save-target-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .save-target-row label { white-space: nowrap; }
  .save-target-select {
    flex: 1;
    background: var(--bg-tertiary);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 6px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    min-width: 0;
  }
  .save-target-select:hover { border-color: var(--accent); }

  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px 8px;
  }

  .history-empty {
    color: var(--text-muted);
    font-size: 12px;
    padding: 24px 16px;
    text-align: center;
    line-height: 1.7;
  }

  .group-section { margin-bottom: 4px; }

  .group-header {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 6px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    border-radius: 4px;
    user-select: none;
    transition: background 0.15s;
  }
  .group-header:hover { background: var(--bg-tertiary); }
  .group-caret {
    width: 14px;
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    transition: transform 0.15s;
  }
  .group-name {
    flex: 1;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .group-count {
    color: var(--text-muted);
    font-size: 11px;
    font-weight: normal;
  }
  .group-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .group-header:hover .group-actions { opacity: 1; }
  .group-action-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-muted);
    font-size: 11px;
    width: 22px;
    height: 22px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
  }
  .group-action-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .group-action-btn.danger:hover {
    border-color: var(--removed-color);
    color: var(--removed-color);
  }

  .group-items {
    padding-left: 12px;
    margin-top: 2px;
  }

  .move-select {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    max-width: 100px;
  }
  .move-select:hover { border-color: var(--accent); color: var(--text); }
  .move-select option { background: var(--bg-secondary); color: var(--text); }

  .history-item {
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    background: var(--bg-tertiary);
    transition: border-color 0.15s, background 0.15s;
  }
  .history-item:hover { border-color: var(--border); }
  .history-item.active {
    border-color: var(--accent);
    background: rgba(47, 129, 247, 0.10);
  }

  .history-item-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-item-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-item-stats {
    display: flex;
    gap: 8px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
  }
  .history-item-stat-add { color: var(--added-color); }
  .history-item-stat-remove { color: var(--removed-color); }

  .history-item-actions {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.15s, max-height 0.15s;
  }
  .history-item:hover .history-item-actions,
  .history-item.active .history-item-actions {
    opacity: 1;
    max-height: 32px;
  }
  .history-action-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .history-action-btn:hover {
    color: var(--text);
    border-color: var(--accent);
  }
  .history-action-btn.danger:hover {
    color: var(--removed-color);
    border-color: var(--removed-color);
  }

  main {
    padding: 16px 20px 32px;
    flex: 1;
    overflow-y: auto;
    min-width: 0;
  }

  .input-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 14px;
  }

  .input-pane { display: flex; flex-direction: column; }

  .input-pane-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    font-size: 13px;
    font-weight: 500;
  }

  .input-pane-header .label-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pane-badge {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: normal;
  }

  .file-btn {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .file-btn:hover { color: var(--text); border-color: var(--accent); }

  .input-pane textarea {
    min-height: 200px;
    background: var(--bg-secondary);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 0 0 6px 6px;
    padding: 12px;
    font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    font-size: 13px;
    line-height: 1.55;
    resize: vertical;
    outline: none;
    tab-size: 2;
  }
  .input-pane textarea:focus { border-color: var(--accent); }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .controls select,
  .controls button {
    background: var(--bg-tertiary);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .controls button:hover,
  .controls select:hover { border-color: var(--accent); }

  .controls button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 500;
  }
  .controls button.primary:hover { background: var(--accent-hover); }

  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
    user-select: none;
    cursor: pointer;
  }
  .toggle-wrap input { cursor: pointer; }

  .controls .spacer { flex: 1; }

  .stats {
    display: flex;
    gap: 18px;
    margin-bottom: 10px;
    font-size: 13px;
    min-height: 20px;
    color: var(--text-muted);
  }
  .stat-added { color: var(--added-color); }
  .stat-removed { color: var(--removed-color); }
  .stat-unchanged { color: var(--text-muted); }

  .diff-output {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: auto;
    font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    font-size: 13px;
    line-height: 1.55;
  }

  .diff-empty {
    padding: 48px 16px;
    text-align: center;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 14px;
  }

  .diff-identical {
    padding: 48px 16px;
    text-align: center;
    color: var(--added-color);
    font-family: inherit;
    font-size: 14px;
  }

  /* Side by side */
  .diff-sbs { display: grid; grid-template-columns: 1fr 1fr; }
  .diff-sbs-pane { overflow-x: auto; min-width: 0; }
  .diff-sbs-pane:first-child { border-right: 1px solid var(--border); }

  /* Lines */
  .diff-line {
    display: grid;
    align-items: stretch;
    min-height: 21px;
  }

  .diff-sbs .diff-line {
    grid-template-columns: 52px 18px 1fr;
  }

  .diff-unified .diff-line {
    grid-template-columns: 52px 52px 18px 1fr;
  }

  .diff-line-num {
    color: var(--text-muted);
    text-align: right;
    padding: 1px 8px 0;
    user-select: none;
    background: rgba(110, 118, 129, 0.08);
    font-size: 12px;
  }

  .diff-line-marker {
    text-align: center;
    user-select: none;
    font-weight: bold;
    padding-top: 1px;
  }

  .diff-line-content {
    padding: 1px 8px 0;
    white-space: pre;
    overflow-x: auto;
  }

  .wrap .diff-line-content {
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
    overflow-x: visible;
  }

  .diff-line.added { background: var(--added-bg); }
  .diff-line.added .diff-line-num { background: var(--added-num-bg); color: var(--added-color); }
  .diff-line.added .diff-line-marker { color: var(--added-color); }

  .diff-line.removed { background: var(--removed-bg); }
  .diff-line.removed .diff-line-num { background: var(--removed-num-bg); color: var(--removed-color); }
  .diff-line.removed .diff-line-marker { color: var(--removed-color); }

  .diff-line.empty { background: var(--empty-bg); }
  .diff-line.empty .diff-line-num { background: var(--empty-bg); }

  .word-added { background: var(--added-word); border-radius: 2px; padding: 0 1px; }
  .word-removed { background: var(--removed-word); border-radius: 2px; padding: 0 1px; }

  .legend {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
  .swatch-add { background: var(--added-color); }
  .swatch-remove { background: var(--removed-color); }
  .swatch-word-add { background: var(--added-word); border: 1px solid var(--added-color); }
  .swatch-word-remove { background: var(--removed-word); border: 1px solid var(--removed-color); }

  /* ==================== THEMES ==================== */
  /* Default (GitHub Dark) is defined in :root above. */

  /* ---- Light: GitHub ---- */
  body[data-theme="github-light"] {
    --bg: #ffffff;
    --bg-secondary: #f6f8fa;
    --bg-tertiary: #eaeef2;
    --border: #d1d9e0;
    --border-light: #d8dee4;
    --text: #1f2328;
    --text-muted: #59636e;
    --added-bg: rgba(31, 136, 61, 0.10);
    --added-num-bg: rgba(31, 136, 61, 0.22);
    --added-word: rgba(31, 136, 61, 0.32);
    --added-color: #1a7f37;
    --removed-bg: rgba(207, 34, 46, 0.10);
    --removed-num-bg: rgba(207, 34, 46, 0.22);
    --removed-word: rgba(207, 34, 46, 0.32);
    --removed-color: #cf222e;
    --accent: #0969da;
    --accent-hover: #0860ca;
    --empty-bg: rgba(208, 215, 222, 0.30);
  }

  /* ---- Liquid Glass (液态玻璃) ---- */
  body[data-theme="liquid-glass"] {
    --bg: #c9d6ff;
    --bg-secondary: rgba(255, 255, 255, 0.55);
    --bg-tertiary: rgba(255, 255, 255, 0.70);
    --border: rgba(255, 255, 255, 0.65);
    --border-light: rgba(255, 255, 255, 0.50);
    --text: #1d1d3a;
    --text-muted: #4a4a6e;
    --added-bg: rgba(16, 185, 129, 0.18);
    --added-num-bg: rgba(16, 185, 129, 0.32);
    --added-word: rgba(16, 185, 129, 0.45);
    --added-color: #047857;
    --removed-bg: rgba(244, 63, 94, 0.18);
    --removed-num-bg: rgba(244, 63, 94, 0.32);
    --removed-word: rgba(244, 63, 94, 0.45);
    --removed-color: #be123c;
    --accent: #6366f1;
    --accent-hover: #4f46e5;
    --empty-bg: rgba(255, 255, 255, 0.25);
    background:
      radial-gradient(circle at 15% 20%, rgba(255, 175, 204, 0.85) 0%, transparent 45%),
      radial-gradient(circle at 85% 10%, rgba(150, 200, 255, 0.85) 0%, transparent 45%),
      radial-gradient(circle at 50% 90%, rgba(192, 234, 196, 0.85) 0%, transparent 50%),
      linear-gradient(135deg, #a6c1ee 0%, #fbc2eb 100%);
    background-attachment: fixed;
  }
  body[data-theme="liquid-glass"] header,
  body[data-theme="liquid-glass"] .sidebar,
  body[data-theme="liquid-glass"] .input-pane-header,
  body[data-theme="liquid-glass"] .input-pane textarea,
  body[data-theme="liquid-glass"] .controls select,
  body[data-theme="liquid-glass"] .controls button,
  body[data-theme="liquid-glass"] .theme-select,
  body[data-theme="liquid-glass"] .sidebar-toggle,
  body[data-theme="liquid-glass"] .diff-output,
  body[data-theme="liquid-glass"] .history-item {
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
  }
  body[data-theme="liquid-glass"] header,
  body[data-theme="liquid-glass"] .sidebar {
    background: rgba(255, 255, 255, 0.45);
  }
  body[data-theme="liquid-glass"] .diff-output,
  body[data-theme="liquid-glass"] .input-pane textarea {
    background: rgba(255, 255, 255, 0.40);
  }
  body[data-theme="liquid-glass"] .input-pane-header {
    background: rgba(255, 255, 255, 0.55);
  }

  /* ---- Aurora (极光梦境) ---- */
  body[data-theme="aurora"] {
    --bg: #0f0a2e;
    --bg-secondary: #1a1240;
    --bg-tertiary: #251a56;
    --border: #3d2f8c;
    --border-light: #2d2270;
    --text: #ece4ff;
    --text-muted: #a89ce0;
    --added-bg: rgba(80, 250, 123, 0.10);
    --added-num-bg: rgba(80, 250, 123, 0.22);
    --added-word: rgba(80, 250, 123, 0.36);
    --added-color: #50fa7b;
    --removed-bg: rgba(255, 121, 198, 0.10);
    --removed-num-bg: rgba(255, 121, 198, 0.22);
    --removed-word: rgba(255, 121, 198, 0.36);
    --removed-color: #ff79c6;
    --accent: #8b5cf6;
    --accent-hover: #7c3aed;
    --empty-bg: rgba(80, 70, 140, 0.18);
    background:
      radial-gradient(ellipse 60% 50% at 20% 0%, rgba(139, 92, 246, 0.30) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(80, 250, 123, 0.15) 0%, transparent 60%),
      #0f0a2e;
    background-attachment: fixed;
  }

  /* ---- Sakura Ins (樱花 Ins) ---- */
  body[data-theme="sakura"] {
    --bg: #fff5f7;
    --bg-secondary: #ffeaef;
    --bg-tertiary: #ffd9e2;
    --border: #f8b8c8;
    --border-light: #fce0e6;
    --text: #5a3247;
    --text-muted: #a07b8e;
    --added-bg: rgba(20, 184, 166, 0.10);
    --added-num-bg: rgba(20, 184, 166, 0.22);
    --added-word: rgba(20, 184, 166, 0.34);
    --added-color: #0d9488;
    --removed-bg: rgba(225, 29, 72, 0.08);
    --removed-num-bg: rgba(225, 29, 72, 0.20);
    --removed-word: rgba(225, 29, 72, 0.28);
    --removed-color: #be123c;
    --accent: #ec4899;
    --accent-hover: #db2777;
    --empty-bg: rgba(252, 200, 211, 0.30);
  }

  /* ---- Monaco (摩纳哥, 黑金高级感) ---- */
  body[data-theme="monaco"] {
    --bg: #0a0a0a;
    --bg-secondary: #141414;
    --bg-tertiary: #1f1c18;
    --border: #2e2820;
    --border-light: #1f1c19;
    --text: #f5e6c8;
    --text-muted: #a89878;
    --added-bg: rgba(52, 211, 153, 0.10);
    --added-num-bg: rgba(52, 211, 153, 0.22);
    --added-word: rgba(52, 211, 153, 0.32);
    --added-color: #34d399;
    --removed-bg: rgba(251, 113, 133, 0.10);
    --removed-num-bg: rgba(251, 113, 133, 0.22);
    --removed-word: rgba(251, 113, 133, 0.32);
    --removed-color: #fb7185;
    --accent: #d4af37;
    --accent-hover: #b89020;
    --empty-bg: rgba(40, 35, 28, 0.40);
  }

  /* ---- Nord (北欧极简) ---- */
  body[data-theme="nord"] {
    --bg: #2e3440;
    --bg-secondary: #3b4252;
    --bg-tertiary: #434c5e;
    --border: #4c566a;
    --border-light: #434c5e;
    --text: #eceff4;
    --text-muted: #d8dee9;
    --added-bg: rgba(163, 190, 140, 0.18);
    --added-num-bg: rgba(163, 190, 140, 0.32);
    --added-word: rgba(163, 190, 140, 0.42);
    --added-color: #a3be8c;
    --removed-bg: rgba(191, 97, 106, 0.18);
    --removed-num-bg: rgba(191, 97, 106, 0.32);
    --removed-word: rgba(191, 97, 106, 0.40);
    --removed-color: #bf616a;
    --accent: #88c0d0;
    --accent-hover: #5e81ac;
    --empty-bg: rgba(76, 86, 106, 0.30);
  }

  /* ---- Sunset (日落, 暖色高级感) ---- */
  body[data-theme="sunset"] {
    --bg: #1a0e0a;
    --bg-secondary: #251510;
    --bg-tertiary: #321d14;
    --border: #4a2e22;
    --border-light: #3a2519;
    --text: #fde4cf;
    --text-muted: #c4a48a;
    --added-bg: rgba(45, 212, 191, 0.12);
    --added-num-bg: rgba(45, 212, 191, 0.26);
    --added-word: rgba(45, 212, 191, 0.38);
    --added-color: #2dd4bf;
    --removed-bg: rgba(248, 113, 113, 0.12);
    --removed-num-bg: rgba(248, 113, 113, 0.26);
    --removed-word: rgba(248, 113, 113, 0.36);
    --removed-color: #f87171;
    --accent: #f97316;
    --accent-hover: #ea580c;
    --empty-bg: rgba(74, 46, 34, 0.40);
    background:
      radial-gradient(ellipse 70% 50% at 100% 0%, rgba(249, 115, 22, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 0% 100%, rgba(220, 38, 38, 0.12) 0%, transparent 60%),
      #1a0e0a;
    background-attachment: fixed;
  }

  /* ---- Pearl (珍珠白, 淡雅高级感) ---- */
  body[data-theme="pearl"] {
    --bg: #f5f1ea;
    --bg-secondary: #faf7f0;
    --bg-tertiary: #ece8df;
    --border: #d8d0c0;
    --border-light: #e0dacd;
    --text: #2d2a26;
    --text-muted: #6d6862;
    --added-bg: rgba(5, 150, 105, 0.08);
    --added-num-bg: rgba(5, 150, 105, 0.20);
    --added-word: rgba(5, 150, 105, 0.28);
    --added-color: #047857;
    --removed-bg: rgba(190, 18, 60, 0.08);
    --removed-num-bg: rgba(190, 18, 60, 0.20);
    --removed-word: rgba(190, 18, 60, 0.28);
    --removed-color: #9f1239;
    --accent: #7c3aed;
    --accent-hover: #6d28d9;
    --empty-bg: rgba(216, 208, 192, 0.40);
    background:
      radial-gradient(circle at 0% 0%, rgba(196, 181, 253, 0.18) 0%, transparent 40%),
      radial-gradient(circle at 100% 100%, rgba(252, 211, 211, 0.18) 0%, transparent 40%),
      #f5f1ea;
    background-attachment: fixed;
  }

  /* ---- Cyber Neon (赛博霓虹) ---- */
  body[data-theme="cyber"] {
    --bg: #0a0418;
    --bg-secondary: #110832;
    --bg-tertiary: #1a0e46;
    --border: #3d2080;
    --border-light: #2a1758;
    --text: #e0d4ff;
    --text-muted: #9385c0;
    --added-bg: rgba(0, 255, 170, 0.10);
    --added-num-bg: rgba(0, 255, 170, 0.24);
    --added-word: rgba(0, 255, 170, 0.40);
    --added-color: #00ffaa;
    --removed-bg: rgba(255, 61, 139, 0.10);
    --removed-num-bg: rgba(255, 61, 139, 0.24);
    --removed-word: rgba(255, 61, 139, 0.38);
    --removed-color: #ff3d8b;
    --accent: #00d4ff;
    --accent-hover: #00b3d8;
    --empty-bg: rgba(40, 20, 80, 0.30);
    background:
      radial-gradient(ellipse 60% 50% at 0% 0%, rgba(0, 212, 255, 0.15) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 100% 100%, rgba(255, 0, 128, 0.15) 0%, transparent 55%),
      #0a0418;
    background-attachment: fixed;
  }
  body[data-theme="cyber"] .word-added { box-shadow: 0 0 6px rgba(0, 255, 170, 0.4); }
  body[data-theme="cyber"] .word-removed { box-shadow: 0 0 6px rgba(255, 61, 139, 0.4); }
  body[data-theme="cyber"] .controls button.primary {
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.35);
  }

  /* ---- Mocha (摩卡咖啡, 温暖高级感) ---- */
  body[data-theme="mocha"] {
    --bg: #1e1612;
    --bg-secondary: #2a1f1a;
    --bg-tertiary: #382a22;
    --border: #4a3a2e;
    --border-light: #3a2c23;
    --text: #ede0d0;
    --text-muted: #b29a82;
    --added-bg: rgba(134, 192, 124, 0.12);
    --added-num-bg: rgba(134, 192, 124, 0.26);
    --added-word: rgba(134, 192, 124, 0.38);
    --added-color: #86c07c;
    --removed-bg: rgba(232, 130, 121, 0.12);
    --removed-num-bg: rgba(232, 130, 121, 0.24);
    --removed-word: rgba(232, 130, 121, 0.34);
    --removed-color: #e88279;
    --accent: #c69478;
    --accent-hover: #b07c5e;
    --empty-bg: rgba(74, 58, 46, 0.40);
  }

  /* ==================== THEME SELECT ==================== */
  .theme-select {
    background: var(--bg-tertiary);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .theme-select:hover { border-color: var(--accent); }
  .theme-select option { background: var(--bg-secondary); color: var(--text); }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  @media (max-width: 800px) {
    .input-section { grid-template-columns: 1fr; }
    .diff-sbs { grid-template-columns: 1fr; }
    .diff-sbs-pane:first-child { border-right: none; border-bottom: 1px solid var(--border); }
    .sidebar { width: 220px; }
    body.sidebar-collapsed .sidebar { width: 0; }
  }

  /* ==================== EXPORT MODAL ==================== */
  .export-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .export-modal-overlay[hidden] { display: none; }
  .export-modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    display: flex;
    flex-direction: column;
  }
  .export-modal-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .export-modal-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .export-modal-close {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    width: 28px;
    height: 28px;
    border-radius: 4px;
  }
  .export-modal-close:hover { background: var(--bg-tertiary); color: var(--text); }
  .export-modal-body { padding: 16px 18px; }
  .export-modal-label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .export-modal-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  .export-modal-input:focus { border-color: var(--accent); }
  .export-modal-hint {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .export-modal-actions {
    padding: 0 18px 18px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .export-modal-btn {
    background: var(--bg-tertiary);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .export-modal-btn:hover:not(:disabled) { border-color: var(--accent); }
  .export-modal-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 500;
  }
  .export-modal-btn.primary:hover:not(:disabled) { background: var(--accent-hover); }
  .export-modal-btn:disabled { opacity: 0.6; cursor: wait; }

  /* Export header (shown during PDF print and inside PNG capture) */
  .export-header {
    display: none;
    padding: 0 0 14px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .export-header-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
    word-break: break-word;
  }
  .export-header-meta {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* PNG capture mode: reveal export-header, expand diff (no scroll), force wrap */
  body.exporting-png .export-header { display: block; }
  body.exporting-png .diff-output {
    overflow: visible !important;
    max-height: none !important;
  }
  body.exporting-png .diff-line-content {
    white-space: pre-wrap !important;
    word-break: break-word !important;
    overflow-wrap: anywhere !important;
    overflow-x: visible !important;
  }
  body.exporting-png .diff-sbs-pane { overflow: visible !important; }

  /* Print: hide chrome, show export-header, expand diff, avoid breaking lines */
  @media print {
    @page { margin: 16mm; }
    html, body {
      height: auto !important;
      overflow: visible !important;
      background: white !important;
    }
    body { display: block !important; }
    body * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    header,
    .sidebar,
    .sidebar-toggle,
    .input-section,
    .controls,
    .export-modal-overlay { display: none !important; }
    .app-body {
      display: block !important;
      height: auto !important;
      overflow: visible !important;
    }
    main {
      display: block !important;
      padding: 0 !important;
      overflow: visible !important;
      height: auto !important;
    }
    .export-header { display: block !important; }
    .stats { margin-bottom: 12px !important; }
    .diff-output {
      overflow: visible !important;
      max-height: none !important;
    }
    .diff-line {
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .diff-line-content {
      white-space: pre-wrap !important;
      word-break: break-word !important;
      overflow-wrap: anywhere !important;
      overflow-x: visible !important;
    }
    .diff-sbs-pane { overflow: visible !important; }
  }
</style>
</head>
<body>

<header>
  <div class="header-flex">
    <button class="sidebar-toggle" id="sidebarToggle" title="显示 / 隐藏历史记录">☰ 历史</button>
    <div class="header-titles">
      <h1>代码 / 提示词对比工具</h1>
      <div class="subtitle">粘贴或上传两个版本，按颜色直观查看改动 · 支持代码与中文提示词</div>
    </div>
    <select class="theme-select" id="themeSelect" title="切换色彩主题">
      <option value="github-dark">🌑 深色经典</option>
      <option value="github-light">☀️ 浅色经典</option>
      <option value="liquid-glass">💧 液态玻璃</option>
      <option value="aurora">🌌 极光梦境</option>
      <option value="sakura">🌸 樱花 Ins</option>
      <option value="monaco">👑 摩纳哥黑金</option>
      <option value="nord">❄️ 北欧极简</option>
      <option value="sunset">🔥 日落暮光</option>
      <option value="pearl">🤍 珍珠白</option>
      <option value="cyber">⚡ 赛博霓虹</option>
      <option value="mocha">☕ 摩卡咖啡</option>
    </select>
  </div>
</header>

<div class="app-body">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div>
        <span class="sidebar-title">历史记录</span>
        <span class="sidebar-count" id="sidebarCount"></span>
      </div>
      <button class="clear-history-btn" id="clearHistoryBtn" title="清空所有记录">清空</button>
    </div>
    <div class="sidebar-toolbar">
      <button class="new-group-btn" id="newGroupBtn" title="新建一个分组（类似文件夹）">+ 新建分组</button>
      <div class="save-target-row" id="saveTargetRow" style="display:none;">
        <label>保存到:</label>
        <select class="save-target-select" id="saveTargetSelect"></select>
      </div>
    </div>
    <div class="history-list" id="historyList"></div>
  </aside>

  <main>
  <div class="input-section">
    <div class="input-pane">
      <div class="input-pane-header">
        <div class="label-left">
          <span>原始版本</span>
          <span class="pane-badge" id="originalBadge">0 行</span>
        </div>
        <label class="file-btn">
          <input type="file" id="originalFile" hidden accept=".txt,.md,.js,.ts,.jsx,.tsx,.py,.java,.go,.rs,.c,.cpp,.h,.html,.css,.json,.yaml,.yml,.xml,.sh,.sql,*">
          上传文件
        </label>
      </div>
      <textarea id="original" placeholder="在此粘贴原始版本的代码或提示词..." spellcheck="false"></textarea>
    </div>
    <div class="input-pane">
      <div class="input-pane-header">
        <div class="label-left">
          <span>修改版本</span>
          <span class="pane-badge" id="modifiedBadge">0 行</span>
        </div>
        <label class="file-btn">
          <input type="file" id="modifiedFile" hidden accept=".txt,.md,.js,.ts,.jsx,.tsx,.py,.java,.go,.rs,.c,.cpp,.h,.html,.css,.json,.yaml,.yml,.xml,.sh,.sql,*">
          上传文件
        </label>
      </div>
      <textarea id="modified" placeholder="在此粘贴修改后的代码或提示词..." spellcheck="false"></textarea>
    </div>
  </div>

  <div class="controls">
    <select id="viewMode" title="视图模式">
      <option value="side-by-side">并排对比</option>
      <option value="unified">统一视图</option>
    </select>
    <select id="granularity" title="行内高亮粒度">
      <option value="word" selected>词级行内高亮</option>
      <option value="char">字符级行内高亮</option>
      <option value="line">仅按行高亮</option>
    </select>
    <label class="toggle-wrap">
      <input type="checkbox" id="ignoreWhitespace"> 忽略空白差异
    </label>
    <label class="toggle-wrap">
      <input type="checkbox" id="wrapLines"> 长行自动换行
    </label>
    <button class="primary" id="compare">对比 (Ctrl+Enter)</button>
    <button id="save" title="保存当前对比到历史记录 (Ctrl+S)">保存</button>
    <button id="swap" title="交换左右内容">交换</button>
    <button id="demo">加载示例</button>
    <button id="clear">清空</button>
    <button id="exportBtn" title="导出 PDF 或长图 PNG，便于转发分享">导出 ▾</button>
  </div>

  <div class="stats" id="stats">
    <div class="legend">
      <div class="legend-item"><span class="legend-swatch swatch-add"></span>新增行</div>
      <div class="legend-item"><span class="legend-swatch swatch-remove"></span>删除行</div>
      <div class="legend-item"><span class="legend-swatch swatch-word-add"></span>新增片段</div>
      <div class="legend-item"><span class="legend-swatch swatch-word-remove"></span>删除片段</div>
    </div>
  </div>

  <div class="diff-output" id="diffOutput">
    <div class="diff-empty">输入两个版本，点击「对比」查看差异 · 也可以点击「加载示例」</div>
  </div>
  </main>
</div>

<div class="export-modal-overlay" id="exportModalOverlay" hidden>
  <div class="export-modal" role="dialog" aria-modal="true" aria-labelledby="exportModalTitle">
    <div class="export-modal-header">
      <div class="export-modal-title" id="exportModalTitle">导出对比结果</div>
      <button class="export-modal-close" id="exportModalClose" title="关闭" aria-label="关闭">×</button>
    </div>
    <div class="export-modal-body">
      <label class="export-modal-label" for="exportTitleInput">标题</label>
      <input type="text" id="exportTitleInput" class="export-modal-input" placeholder="给这次对比起个名字（可留空）" maxlength="120">
      <div class="export-modal-hint">PDF 会调起系统打印面板，目标选「存储为 PDF」即可；PNG 直接下载到本地。</div>
    </div>
    <div class="export-modal-actions">
      <button id="exportPdfBtn" class="export-modal-btn primary">保存为 PDF</button>
      <button id="exportPngBtn" class="export-modal-btn">下载长图 PNG</button>
    </div>
  </div>
</div>

// ---------- Theme ----------
const THEME_KEY = "code-prompt-review-theme";
const VALID_THEMES = new Set([
  "github-dark", "github-light", "liquid-glass", "aurora", "sakura",
  "monaco", "nord", "sunset", "pearl", "cyber", "mocha",
]);

function applyTheme(theme) {
  if (!VALID_THEMES.has(theme)) theme = "github-dark";
  document.body.dataset.theme = theme;
  if (els.themeSelect.value !== theme) els.themeSelect.value = theme;
  try { localStorage.setItem(THEME_KEY, theme); } catch (e) { /* ignore */ }
}

(function initTheme() {
  let saved = "github-dark";
  try { saved = localStorage.getItem(THEME_KEY) || saved; } catch (e) { /* ignore */ }
  applyTheme(saved);
})();

els.themeSelect.addEventListener("change", (e) => applyTheme(e.target.value));

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function updateBadge() {
  const o = els.original.value;
  const m = els.modified.value;
  els.originalBadge.textContent = (o ? o.split("\n").length : 0) + " 行";
  els.modifiedBadge.textContent = (m ? m.split("\n").length : 0) + " 行";
}

// ---------- Diff core (LCS based) ----------
// Generic diff over arrays. Returns sequence of {type, value} per element.
function diffSequence(a, b, eqFn) {
  const eq = eqFn || ((x, y) => x === y);
  const m = a.length;
  const n = b.length;

  // Trim common prefix and suffix to shrink the LCS table.
  let pre = 0;
  while (pre < m && pre < n && eq(a[pre], b[pre])) pre++;

  let endA = m, endB = n;
  while (endA > pre && endB > pre && eq(a[endA - 1], b[endB - 1])) {
    endA--;
    endB--;
  }

  const subA = a.slice(pre, endA);
  const subB = b.slice(pre, endB);
  const sm = subA.length;
  const sn = subB.length;

  // LCS dynamic programming table.
  const lcs = new Array(sm + 1);
  for (let i = 0; i <= sm; i++) lcs[i] = new Int32Array(sn + 1);

  for (let i = 1; i <= sm; i++) {
    const ai = subA[i - 1];
    const row = lcs[i];
    const prevRow = lcs[i - 1];
    for (let j = 1; j <= sn; j++) {
      if (eq(ai, subB[j - 1])) {
        row[j] = prevRow[j - 1] + 1;
      } else {
        row[j] = prevRow[j] >= row[j - 1] ? prevRow[j] : row[j - 1];
      }
    }
  }

  const out = [];
  for (let i = 0; i < pre; i++) out.push({ type: "equal", value: a[i] });

  const middle = [];
  let i = sm, j = sn;
  while (i > 0 && j > 0) {
    if (eq(subA[i - 1], subB[j - 1])) {
      middle.push({ type: "equal", value: subA[i - 1] });
      i--; j--;
    } else if (lcs[i - 1][j] >= lcs[i][j - 1]) {
      middle.push({ type: "remove", value: subA[i - 1] });
      i--;
    } else {
      middle.push({ type: "add", value: subB[j - 1] });
      j--;
    }
  }
  while (i > 0) { i--; middle.push({ type: "remove", value: subA[i] }); }
  while (j > 0) { j--; middle.push({ type: "add", value: subB[j] }); }
  for (let k = middle.length - 1; k >= 0; k--) out.push(middle[k]);

  for (let k = endA; k < m; k++) out.push({ type: "equal", value: a[k] });
  return out;
}

// Split text into lines without losing trailing empty line distinction.
function splitLines(text) {
  if (text === "") return [];
  // Normalize line endings.
  const normalized = text.replace(/\r\n?/g, "\n");
  return normalized.split("\n");
}

// Tokenize text into words/whitespace/CJK-chars/symbols for word-level diff.
function tokenize(text) {
  if (text === "") return [];
  const tokens = [];
  // Match: whitespace run | ASCII word | single non-word char (including CJK).
  const re = /\s+|[A-Za-z0-9_]+|[\s\S]/gu;
  let m;
  while ((m = re.exec(text)) !== null) tokens.push(m[0]);
  return tokens;
}

function lineDiff(a, b, ignoreWs) {
  const linesA = splitLines(a);
  const linesB = splitLines(b);
  const eq = ignoreWs
    ? (x, y) => x.replace(/\s+/g, "") === y.replace(/\s+/g, "")
    : undefined;
  return diffSequence(linesA, linesB, eq);
}

// ---------- Block grouping ----------
// Combine adjacent remove+add into "modify" so we can show paired inline diff.
function groupBlocks(parts) {
  const blocks = [];
  let i = 0;
  while (i < parts.length) {
    const t = parts[i].type;
    if (t === "equal") {
      const lines = [];
      while (i < parts.length && parts[i].type === "equal") {
        lines.push(parts[i].value);
        i++;
      }
      blocks.push({ type: "equal", lines });
    } else if (t === "remove") {
      const removes = [];
      while (i < parts.length && parts[i].type === "remove") {
        removes.push(parts[i].value);
        i++;
      }
      const adds = [];
      while (i < parts.length && parts[i].type === "add") {
        adds.push(parts[i].value);
        i++;
      }
      if (adds.length) {
        blocks.push({ type: "modify", leftLines: removes, rightLines: adds });
      } else {
        blocks.push({ type: "remove", lines: removes });
      }
    } else {
      // pure add (no preceding remove)
      const adds = [];
      while (i < parts.length && parts[i].type === "add") {
        adds.push(parts[i].value);
        i++;
      }
      blocks.push({ type: "add", lines: adds });
    }
  }
  return blocks;
}

// Produce inline-highlighted HTML for a (left, right) pair.
function inlineDiff(left, right, granularity) {
  if (granularity === "line") {
    return [escapeHtml(left), escapeHtml(right)];
  }
  const tokenize_ = granularity === "char"
    ? (s) => Array.from(s) // proper unicode chars
    : tokenize;

  const tokensA = tokenize_(left);
  const tokensB = tokenize_(right);
  const parts = diffSequence(tokensA, tokensB);

  let leftHtml = "";
  let rightHtml = "";
  for (const p of parts) {
    const esc = escapeHtml(p.value);
    if (p.type === "equal") {
      leftHtml += esc;
      rightHtml += esc;
    } else if (p.type === "remove") {
      leftHtml += `<span class="word-removed">${esc}</span>`;
    } else if (p.type === "add") {
      rightHtml += `<span class="word-added">${esc}</span>`;
    }
  }
  return [leftHtml, rightHtml];
}

// ---------- Renderers ----------
function renderLineSbs(num, marker, contentHtml, cls) {
  return `<div class="diff-line ${cls}"><div class="diff-line-num">${num}</div><div class="diff-line-marker">${marker}</div><div class="diff-line-content">${contentHtml || "&nbsp;"}</div></div>`;
}

function renderLineUnified(lNum, rNum, marker, contentHtml, cls) {
  return `<div class="diff-line ${cls}"><div class="diff-line-num">${lNum}</div><div class="diff-line-num">${rNum}</div><div class="diff-line-marker">${marker}</div><div class="diff-line-content">${contentHtml || "&nbsp;"}</div></div>`;
}

function renderSideBySide(blocks, granularity) {
  let leftHtml = "";
  let rightHtml = "";
  let lNo = 1, rNo = 1;

  for (const b of blocks) {
    if (b.type === "equal") {
      for (const line of b.lines) {
        const esc = escapeHtml(line);
        leftHtml += renderLineSbs(lNo, " ", esc, "equal");
        rightHtml += renderLineSbs(rNo, " ", esc, "equal");
        lNo++; rNo++;
      }
    } else if (b.type === "remove") {
      for (const line of b.lines) {
        leftHtml += renderLineSbs(lNo, "-", escapeHtml(line), "removed");
        rightHtml += renderLineSbs("", " ", "", "empty");
        lNo++;
      }
    } else if (b.type === "add") {
      for (const line of b.lines) {
        leftHtml += renderLineSbs("", " ", "", "empty");
        rightHtml += renderLineSbs(rNo, "+", escapeHtml(line), "added");
        rNo++;
      }
    } else if (b.type === "modify") {
      const len = Math.max(b.leftLines.length, b.rightLines.length);
      for (let i = 0; i < len; i++) {
        const left = i < b.leftLines.length ? b.leftLines[i] : null;
        const right = i < b.rightLines.length ? b.rightLines[i] : null;
        if (left !== null && right !== null) {
          const [lh, rh] = inlineDiff(left, right, granularity);
          leftHtml += renderLineSbs(lNo, "-", lh, "removed");
          rightHtml += renderLineSbs(rNo, "+", rh, "added");
          lNo++; rNo++;
        } else if (left !== null) {
          leftHtml += renderLineSbs(lNo, "-", escapeHtml(left), "removed");
          rightHtml += renderLineSbs("", " ", "", "empty");
          lNo++;
        } else {
          leftHtml += renderLineSbs("", " ", "", "empty");
          rightHtml += renderLineSbs(rNo, "+", escapeHtml(right), "added");
          rNo++;
        }
      }
    }
  }

  return `<div class="diff-sbs"><div class="diff-sbs-pane">${leftHtml}</div><div class="diff-sbs-pane">${rightHtml}</div></div>`;
}

function renderUnified(blocks, granularity) {
  let html = "";
  let lNo = 1, rNo = 1;

  for (const b of blocks) {
    if (b.type === "equal") {
      for (const line of b.lines) {
        html += renderLineUnified(lNo, rNo, " ", escapeHtml(line), "equal");
        lNo++; rNo++;
      }
    } else if (b.type === "remove") {
      for (const line of b.lines) {
        html += renderLineUnified(lNo, "", "-", escapeHtml(line), "removed");
        lNo++;
      }
    } else if (b.type === "add") {
      for (const line of b.lines) {
        html += renderLineUnified("", rNo, "+", escapeHtml(line), "added");
        rNo++;
      }
    } else if (b.type === "modify") {
      // Show all removed lines first (with inline highlights vs paired right line),
      // then all added lines (with inline highlights vs paired left line).
      for (let i = 0; i < b.leftLines.length; i++) {
        const left = b.leftLines[i];
        const right = i < b.rightLines.length ? b.rightLines[i] : null;
        const leftHtml = right !== null ? inlineDiff(left, right, granularity)[0] : escapeHtml(left);
        html += renderLineUnified(lNo, "", "-", leftHtml, "removed");
        lNo++;
      }
      for (let i = 0; i < b.rightLines.length; i++) {
        const right = b.rightLines[i];
        const left = i < b.leftLines.length ? b.leftLines[i] : null;
        const rightHtml = left !== null ? inlineDiff(left, right, granularity)[1] : escapeHtml(right);
        html += renderLineUnified("", rNo, "+", rightHtml, "added");
        rNo++;
      }
    }
  }

  return `<div class="diff-unified">${html}</div>`;
}

// ---------- Stats ----------
function computeStats(blocks) {
  let added = 0, removed = 0, unchanged = 0;
  for (const b of blocks) {
    if (b.type === "equal") unchanged += b.lines.length;
    else if (b.type === "add") added += b.lines.length;
    else if (b.type === "remove") removed += b.lines.length;
    else if (b.type === "modify") {
      added += b.rightLines.length;
      removed += b.leftLines.length;
    }
  }
  return { added, removed, unchanged };
}

// ---------- Main compare ----------
function doCompare() {
  const original = els.original.value;
  const modified = els.modified.value;

  updateBadge();

  if (!original && !modified) {
    els.diffOutput.innerHTML = '<div class="diff-empty">请输入要对比的内容</div>';
    renderStats(null);
    return;
  }

  if (original === modified) {
    els.diffOutput.innerHTML = '<div class="diff-identical">两个版本完全相同，没有差异</div>';
    renderStats(
      { added: 0, removed: 0, unchanged: splitLines(original).length },
      { o: estimateTokens(original), m: estimateTokens(modified) }
    );
    return;
  }

  const ignoreWs = els.ignoreWhitespace.checked;
  const granularity = els.granularity.value;
  const viewMode = els.viewMode.value;

  const parts = lineDiff(original, modified, ignoreWs);
  const blocks = groupBlocks(parts);
  const stats = computeStats(blocks);
  renderStats(stats, { o: estimateTokens(original), m: estimateTokens(modified) });

  const wrapCls = els.wrapLines.checked ? " wrap" : "";
  const inner = viewMode === "unified"
    ? renderUnified(blocks, granularity)
    : renderSideBySide(blocks, granularity);
  els.diffOutput.className = "diff-output" + wrapCls;
  els.diffOutput.innerHTML = inner;
}

function buildTokenChip(tokenInfo) {
  if (!tokenInfo) return "";
  const o = tokenInfo.o || 0;
  const m = tokenInfo.m || 0;
  const delta = m - o;
  let pct;
  if (o > 0) pct = (delta / o) * 100;
  else pct = m > 0 ? 100 : 0;
  const sign = delta > 0 ? "+" : (delta < 0 ? "" : "±");
  const cls = delta > 0 ? "stat-tokens-delta-up"
            : delta < 0 ? "stat-tokens-delta-down"
            : "";
  const deltaText =
    ` <span class="${cls}">${sign}${formatTokens(delta)} ` +
    `(${sign}${pct.toFixed(1)}%)</span>`;
  return (
    `<span class="stat-tokens">` +
    `≈ ${formatTokens(o)} → ${formatTokens(m)} tokens${deltaText}` +
    `</span>`
  );
}

function renderStats(stats, tokenInfo) {
  const legend = `<div class="legend">
    <div class="legend-item"><span class="legend-swatch swatch-add"></span>新增行</div>
    <div class="legend-item"><span class="legend-swatch swatch-remove"></span>删除行</div>
    <div class="legend-item"><span class="legend-swatch swatch-word-add"></span>新增片段</div>
    <div class="legend-item"><span class="legend-swatch swatch-word-remove"></span>删除片段</div>
  </div>`;
  if (!stats) {
    els.stats.innerHTML = legend;
    return;
  }
  els.stats.innerHTML =
    `<span class="stat-added">+ ${stats.added} 行新增</span>` +
    `<span class="stat-removed">- ${stats.removed} 行删除</span>` +
    `<span class="stat-unchanged">${stats.unchanged} 行未变</span>` +
    buildTokenChip(tokenInfo) +
    legend;
}

// ---------- Export (PDF / PNG) ----------
function pad2(n) { return String(n).padStart(2, "0"); }

function nowStamps() {
  const d = new Date();
  const display =
    `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())} ` +
    `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  const file =
    `${d.getFullYear()}${pad2(d.getMonth() + 1)}${pad2(d.getDate())}-` +
    `${pad2(d.getHours())}${pad2(d.getMinutes())}${pad2(d.getSeconds())}`;
  return { display, file };
}

function sanitizeFilename(name) {
  const cleaned = (name || "").replace(/[\\/:*?"<>|]/g, "_").trim().slice(0, 80);
  return cleaned || "diff";
}

function currentExportDefaultTitle() {
  if (activeHistoryId) {
    const item = state.history.find(h => h.id === activeHistoryId);
    if (item && item.title) return item.title;
  }
  return "";
}

function buildExportHeader(title, displayStamp) {
  const wrap = document.createElement("div");
  wrap.className = "export-header";
  const t = document.createElement("div");
  t.className = "export-header-title";
  t.textContent = (title && title.trim()) ? title.trim() : "对比结果";
  const m = document.createElement("div");
  m.className = "export-header-meta";
  m.textContent = "生成于 " + displayStamp;
  wrap.appendChild(t);
  wrap.appendChild(m);
  return wrap;
}

function hasDiffContent() {
  return !!els.diffOutput.querySelector(".diff-sbs, .diff-unified, .diff-identical");
}

function openExportModal() {
  if (!hasDiffContent()) {
    alert("请先点击「对比」生成结果，再导出。");
    return;
  }
  els.exportTitleInput.value = currentExportDefaultTitle();
  els.exportModalOverlay.hidden = false;
  setTimeout(() => {
    els.exportTitleInput.focus();
    els.exportTitleInput.select();
  }, 50);
}

function closeExportModal() {
  els.exportModalOverlay.hidden = true;
}

function exportPdf() {
  const title = els.exportTitleInput.value.trim();
  const stamp = nowStamps();

  // Inject export header just before the stats row so it appears at the top of print output.
  const headerEl = buildExportHeader(title, stamp.display);
  headerEl.style.display = "block";
  const mainEl = document.querySelector("main");
  mainEl.insertBefore(headerEl, els.stats);

  // Hide modal so the print preview is clean.
  els.exportModalOverlay.hidden = true;

  // Set document.title so the default print filename is sensible in browsers that honor it.
  const oldTitle = document.title;
  document.title = `${sanitizeFilename(title || "diff")}-${stamp.file}`;

  let cleaned = false;
  const cleanup = () => {
    if (cleaned) return;
    cleaned = true;
    if (headerEl.parentNode) headerEl.parentNode.removeChild(headerEl);
    document.title = oldTitle;
    window.removeEventListener("afterprint", cleanup);
  };
  window.addEventListener("afterprint", cleanup);

  // Give the layout one frame to apply before opening the print dialog.
  requestAnimationFrame(() => {
    try {
      window.print();
    } catch (err) {
      cleanup();
      alert("打开打印面板失败：" + (err && err.message ? err.message : err));
    }
  });
}

async function exportPng() {
  if (typeof html2canvas === "undefined") {
    alert("长图导出依赖的脚本未加载，请刷新页面重试。");
    return;
  }

  const title = els.exportTitleInput.value.trim();
  const stamp = nowStamps();
  const btn = els.exportPngBtn;
  const oldText = btn.textContent;
  btn.disabled = true;
  els.exportPdfBtn.disabled = true;
  btn.textContent = "正在生成…";

  const bodyStyle = getComputedStyle(document.body);
  const bgColor = (bodyStyle.getPropertyValue("--bg") || "").trim() || bodyStyle.backgroundColor || "#0d1117";

  // Build an off-screen container with the export layout.
  const exportRoot = document.createElement("div");
  exportRoot.id = "pngExportRoot";
  exportRoot.style.cssText =
    "position:absolute;left:-99999px;top:0;width:1100px;padding:28px;box-sizing:border-box;" +
    "background:" + bgColor + ";";

  // Header
  const headerEl = buildExportHeader(title, stamp.display);
  headerEl.style.display = "block";
  exportRoot.appendChild(headerEl);

  // Stats clone
  const statsClone = els.stats.cloneNode(true);
  statsClone.style.marginBottom = "14px";
  exportRoot.appendChild(statsClone);

  // Diff clone with forced wrap / no internal scroll
  const diffClone = els.diffOutput.cloneNode(true);
  diffClone.classList.add("wrap");
  diffClone.style.overflow = "visible";
  diffClone.style.maxHeight = "none";
  diffClone.querySelectorAll(".diff-line-content").forEach(el => {
    el.style.whiteSpace = "pre-wrap";
    el.style.wordBreak = "break-word";
    el.style.overflowWrap = "anywhere";
    el.style.overflowX = "visible";
  });
  diffClone.querySelectorAll(".diff-sbs-pane").forEach(el => {
    el.style.overflow = "visible";
  });
  exportRoot.appendChild(diffClone);

  document.body.appendChild(exportRoot);
  document.body.classList.add("exporting-png");

  try {
    const canvas = await html2canvas(exportRoot, {
      backgroundColor: bgColor,
      scale: 2,
      logging: false,
      useCORS: false,
      windowWidth: 1100,
    });

    await new Promise((resolve, reject) => {
      canvas.toBlob((blob) => {
        if (!blob) { reject(new Error("生成图片失败（toBlob 返回空）")); return; }
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${sanitizeFilename(title || "diff")}-${stamp.file}.png`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        resolve();
      }, "image/png");
    });

    closeExportModal();
  } catch (err) {
    const msg = err && err.message ? err.message : String(err);
    alert("生成长图失败：" + msg + "\n\n（如果 diff 过长，可能超过浏览器画布尺寸上限，建议改用 PDF 导出。）");
  } finally {
    if (exportRoot.parentNode) exportRoot.parentNode.removeChild(exportRoot);
    document.body.classList.remove("exporting-png");
    btn.disabled = false;
    els.exportPdfBtn.disabled = false;
    btn.textContent = oldText;
  }
}

// ---------- History & Groups (localStorage) ----------
const STORAGE_KEY = "code-prompt-review-state-v2";
const LEGACY_KEY = "code-prompt-review-history-v1";
const MAX_HISTORY = 100;
const UNGROUPED_ID = "__ungrouped__"; // pseudo group id for items without a real group
let state = loadStateFromStorage();
let activeHistoryId = null;

function defaultState() {
  return { groups: [], history: [], saveTarget: null, collapsedGroups: [] };
}

function normalizeState(raw) {
  const out = defaultState();
  if (Array.isArray(raw.groups)) out.groups = raw.groups.filter(g => g && g.id && g.name);
  if (Array.isArray(raw.history)) out.history = raw.history;
  if (typeof raw.saveTarget === "string" || raw.saveTarget === null) out.saveTarget = raw.saveTarget;
  if (Array.isArray(raw.collapsedGroups)) out.collapsedGroups = raw.collapsedGroups;
  // Drop saveTarget if it points to a non-existent group
  if (out.saveTarget && !out.groups.some(g => g.id === out.saveTarget)) out.saveTarget = null;
  return out;
}

function loadStateFromStorage() {
  try {
    const v2 = localStorage.getItem(STORAGE_KEY);
    if (v2) {
      const parsed = JSON.parse(v2);
      if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {
        return normalizeState(parsed);
      }
    }
  } catch (e) { /* fall through */ }

  // One-time migration from v1 (flat array of history items).
  try {
    const v1 = localStorage.getItem(LEGACY_KEY);
    if (v1) {
      const arr = JSON.parse(v1);
      if (Array.isArray(arr)) {
        return normalizeState({ groups: [], history: arr, saveTarget: null, collapsedGroups: [] });
      }
    }
  } catch (e) { /* fall through */ }

  return defaultState();
}

function persistState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    return true;
  } catch (e) {
    alert("保存到本地存储失败：" + e.message);
    return false;
  }
}

function genId() {
  return Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
}

function generateDefaultTitle(original, modified) {
  const source = modified || original || "";
  const firstLine = source.split("\n").find((l) => l.trim().length > 0) || "";
  const trimmed = firstLine.trim().slice(0, 40);
  if (trimmed) return trimmed;
  const d = new Date();
  return `对比 ${d.getMonth() + 1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, "0")}`;
}

// ---- Groups CRUD ----

function createGroup() {
  const name = prompt("新分组名称：", "");
  if (name === null) return;
  const trimmed = (name || "").trim();
  if (!trimmed) return;
  if (state.groups.some(g => g.name === trimmed)) {
    alert(`分组「${trimmed}」已存在`);
    return;
  }
  const g = { id: genId(), name: trimmed, createdAt: Date.now() };
  state.groups.unshift(g);
  state.saveTarget = g.id; // newly created group becomes the active save target
  persistState();
  renderHistory();
}

function renameGroup(groupId) {
  const g = state.groups.find(g => g.id === groupId);
  if (!g) return;
  const next = prompt("重命名分组：", g.name);
  if (next === null) return;
  const trimmed = (next || "").trim();
  if (!trimmed || trimmed === g.name) return;
  if (state.groups.some(o => o.id !== groupId && o.name === trimmed)) {
    alert(`分组「${trimmed}」已存在`);
    return;
  }
  g.name = trimmed;
  persistState();
  renderHistory();
}

function deleteGroup(groupId) {
  const g = state.groups.find(g => g.id === groupId);
  if (!g) return;
  const itemsInGroup = state.history.filter(h => h.groupId === groupId);
  const msg = itemsInGroup.length > 0
    ? `删除分组「${g.name}」？\n组内 ${itemsInGroup.length} 条记录将移到「未分组」。`
    : `删除空分组「${g.name}」？`;
  if (!confirm(msg)) return;
  itemsInGroup.forEach(h => { h.groupId = null; });
  state.groups = state.groups.filter(o => o.id !== groupId);
  if (state.saveTarget === groupId) state.saveTarget = null;
  state.collapsedGroups = state.collapsedGroups.filter(id => id !== groupId);
  persistState();
  renderHistory();
}

function toggleGroupCollapsed(collapseId) {
  const idx = state.collapsedGroups.indexOf(collapseId);
  if (idx >= 0) state.collapsedGroups.splice(idx, 1);
  else state.collapsedGroups.push(collapseId);
  persistState();
  renderHistory();
}

function setSaveTarget(groupId) {
  state.saveTarget = groupId || null;
  persistState();
}

// ---- History items ----

function saveCurrent() {
  const original = els.original.value;
  const modified = els.modified.value;

  if (!original && !modified) {
    alert("当前没有内容可保存，请先输入或加载示例。");
    return;
  }

  const defaultTitle = generateDefaultTitle(original, modified);
  const input = prompt("为这次对比命名（留空则使用默认）：", defaultTitle);
  if (input === null) return;
  const title = (input || "").trim() || defaultTitle;

  const parts = lineDiff(original, modified, els.ignoreWhitespace.checked);
  const blocks = groupBlocks(parts);
  const stats = computeStats(blocks);

  const entry = {
    id: genId(),
    title,
    original,
    modified,
    viewMode: els.viewMode.value,
    granularity: els.granularity.value,
    ignoreWhitespace: els.ignoreWhitespace.checked,
    wrapLines: els.wrapLines.checked,
    stats,
    savedAt: Date.now(),
    groupId: state.saveTarget,
  };

  state.history.unshift(entry);
  if (state.history.length > MAX_HISTORY) state.history = state.history.slice(0, MAX_HISTORY);
  activeHistoryId = entry.id;
  persistState();
  renderHistory();
}

function loadHistoryItem(id) {
  const item = state.history.find(h => h.id === id);
  if (!item) return;
  els.original.value = item.original || "";
  els.modified.value = item.modified || "";
  if (item.viewMode) els.viewMode.value = item.viewMode;
  if (item.granularity) els.granularity.value = item.granularity;
  els.ignoreWhitespace.checked = !!item.ignoreWhitespace;
  els.wrapLines.checked = !!item.wrapLines;
  activeHistoryId = id;
  updateBadge();
  doCompare();
  renderHistory();
}

function deleteHistoryItem(id) {
  const item = state.history.find(h => h.id === id);
  if (!item) return;
  if (!confirm(`确定删除「${item.title}」吗？`)) return;
  state.history = state.history.filter(h => h.id !== id);
  if (activeHistoryId === id) activeHistoryId = null;
  persistState();
  renderHistory();
}

function renameHistoryItem(id) {
  const item = state.history.find(h => h.id === id);
  if (!item) return;
  const next = prompt("重命名为：", item.title);
  if (next === null) return;
  const trimmed = (next || "").trim();
  if (!trimmed || trimmed === item.title) return;
  item.title = trimmed;
  persistState();
  renderHistory();
}

function moveItemToGroup(itemId, targetGroupId) {
  const item = state.history.find(h => h.id === itemId);
  if (!item) return;
  // Empty string ("未分组") becomes null
  item.groupId = targetGroupId || null;
  persistState();
  renderHistory();
}

function clearAllHistory() {
  if (state.history.length === 0) return;
  if (!confirm(`确定清空全部 ${state.history.length} 条历史记录？\n（分组本身会保留）`)) return;
  state.history = [];
  activeHistoryId = null;
  persistState();
  renderHistory();
}

function formatRelativeTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  if (sameDay) return `今天 ${hh}:${mm}`;
  const yesterday = new Date(now);
  yesterday.setDate(now.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return `昨天 ${hh}:${mm}`;
  return `${d.getMonth() + 1}/${d.getDate()} ${hh}:${mm}`;
}

// ---- Rendering ----

function renderItem(item) {
  const isActive = item.id === activeHistoryId;
  const time = formatRelativeTime(item.savedAt);
  const stats = item.stats || { added: 0, removed: 0 };

  // Build "move to..." dropdown listing other groups + ungrouped (if currently grouped).
  let moveSelect = "";
  if (state.groups.length > 0) {
    let opts = '<option value="__placeholder__">移动到…</option>';
    for (const g of state.groups) {
      if (g.id === item.groupId) continue;
      opts += `<option value="${g.id}">${escapeHtml(g.name)}</option>`;
    }
    if (item.groupId) opts += '<option value="">未分组</option>';
    moveSelect = `<select class="move-select" data-action="move">${opts}</select>`;
  }

  return `<div class="history-item${isActive ? " active" : ""}" data-id="${item.id}">
    <div class="history-item-title" title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</div>
    <div class="history-item-meta">
      <span>${time}</span>
      <span class="history-item-stats">
        <span class="history-item-stat-add">+${stats.added}</span>
        <span class="history-item-stat-remove">-${stats.removed}</span>
      </span>
    </div>
    <div class="history-item-actions">
      ${moveSelect}
      <button class="history-action-btn" data-action="rename">重命名</button>
      <button class="history-action-btn danger" data-action="delete">删除</button>
    </div>
  </div>`;
}

function renderGroupSection(collapseId, name, items, opts) {
  const isCollapsed = state.collapsedGroups.includes(collapseId);
  const caret = isCollapsed ? "▶" : "▼";
  const headerActions = opts.deletable
    ? `<div class="group-actions">
         <button class="group-action-btn" data-group-action="rename" data-group-id="${opts.groupId}" title="重命名">✎</button>
         <button class="group-action-btn danger" data-group-action="delete" data-group-id="${opts.groupId}" title="删除">✕</button>
       </div>`
    : "";
  const itemsHtml = isCollapsed
    ? ""
    : items.length
      ? `<div class="group-items">${items.map(renderItem).join("")}</div>`
      : `<div class="group-items"><div class="history-empty" style="padding:8px 6px;font-size:11px;">该分组暂无记录</div></div>`;

  return `<div class="group-section">
    <div class="group-header" data-collapse-id="${collapseId}">
      <span class="group-caret">${caret}</span>
      <span class="group-name">${escapeHtml(name)}</span>
      <span class="group-count">(${items.length})</span>
      ${headerActions}
    </div>
    ${itemsHtml}
  </div>`;
}

function renderHistory() {
  // Top count
  els.sidebarCount.textContent = state.history.length ? `(${state.history.length})` : "";

  // Save-target row visible only when there is at least one group
  if (state.groups.length > 0) {
    els.saveTargetRow.style.display = "";
    let opts = '<option value="">未分组</option>';
    for (const g of state.groups) {
      opts += `<option value="${g.id}">${escapeHtml(g.name)}</option>`;
    }
    els.saveTargetSelect.innerHTML = opts;
    els.saveTargetSelect.value = state.saveTarget || "";
  } else {
    els.saveTargetRow.style.display = "none";
  }

  // Empty-state when nothing exists at all
  if (state.groups.length === 0 && state.history.length === 0) {
    els.historyList.innerHTML =
      '<div class="history-empty">暂无保存的对比<br><br>点击「保存」按钮保存当前对比，<br>或点击上方「+ 新建分组」按项目 / 功能分类管理。</div>';
    return;
  }

  // Bucket items by group
  const byGroup = new Map();
  for (const item of state.history) {
    const gid = item.groupId || null;
    if (!byGroup.has(gid)) byGroup.set(gid, []);
    byGroup.get(gid).push(item);
  }

  let html = "";
  for (const g of state.groups) {
    const items = byGroup.get(g.id) || [];
    html += renderGroupSection(g.id, g.name, items, { deletable: true, groupId: g.id });
  }

  // Always show 未分组 section when groups exist (it's the catch-all).
  // When there are no groups, just render items directly without a section header.
  const ungrouped = byGroup.get(null) || [];
  if (state.groups.length > 0) {
    html += renderGroupSection(UNGROUPED_ID, "未分组", ungrouped, { deletable: false });
  } else {
    html += ungrouped.map(renderItem).join("");
  }

  els.historyList.innerHTML = html;
}

// ---- Event delegation ----

els.historyList.addEventListener("click", (e) => {
  // Group-header action buttons (rename / delete group)
  const groupActionBtn = e.target.closest("[data-group-action]");
  if (groupActionBtn) {
    e.stopPropagation();
    const action = groupActionBtn.dataset.groupAction;
    const gid = groupActionBtn.dataset.groupId;
    if (action === "rename") renameGroup(gid);
    else if (action === "delete") deleteGroup(gid);
    return;
  }

  // Group header itself → collapse / expand
  const groupHeader = e.target.closest(".group-header");
  if (groupHeader) {
    toggleGroupCollapsed(groupHeader.dataset.collapseId);
    return;
  }

  // History item actions
  const itemEl = e.target.closest(".history-item");
  if (!itemEl) return;
  const id = itemEl.dataset.id;
  const action = e.target.dataset.action;
  if (action === "rename") {
    e.stopPropagation();
    renameHistoryItem(id);
  } else if (action === "delete") {
    e.stopPropagation();
    deleteHistoryItem(id);
  } else if (action === "move") {
    // handled by 'change' listener below
  } else {
    loadHistoryItem(id);
  }
});

els.historyList.addEventListener("change", (e) => {
  if (e.target.dataset && e.target.dataset.action === "move") {
    const itemEl = e.target.closest(".history-item");
    if (!itemEl) return;
    const target = e.target.value;
    if (target === "__placeholder__") return;
    moveItemToGroup(itemEl.dataset.id, target);
  }
});

els.newGroupBtn.addEventListener("click", createGroup);
els.saveTargetSelect.addEventListener("change", (e) => setSaveTarget(e.target.value));

// ---------- Event wiring ----------
function readFileInto(input, target) {
  input.addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      target.value = ev.target.result;
      updateBadge();
      doCompare();
    };
    reader.readAsText(file);
    input.value = ""; // allow same-file re-upload
  });
}

readFileInto(els.originalFile, els.original);
readFileInto(els.modifiedFile, els.modified);

els.compareBtn.addEventListener("click", doCompare);
els.saveBtn.addEventListener("click", saveCurrent);
els.viewMode.addEventListener("change", doCompare);
els.granularity.addEventListener("change", doCompare);
els.ignoreWhitespace.addEventListener("change", doCompare);
els.wrapLines.addEventListener("change", doCompare);

els.swapBtn.addEventListener("click", () => {
  const a = els.original.value;
  els.original.value = els.modified.value;
  els.modified.value = a;
  updateBadge();
  doCompare();
});

els.demoBtn.addEventListener("click", () => {
  els.original.value = DEMO_ORIGINAL;
  els.modified.value = DEMO_MODIFIED;
  activeHistoryId = null;
  updateBadge();
  doCompare();
  renderHistory();
});

els.clearBtn.addEventListener("click", () => {
  els.original.value = "";
  els.modified.value = "";
  activeHistoryId = null;
  updateBadge();
  els.diffOutput.innerHTML = '<div class="diff-empty">输入两个版本，点击「对比」查看差异 · 也可以点击「加载示例」</div>';
  renderStats(null);
  renderHistory();
});

els.sidebarToggle.addEventListener("click", () => {
  document.body.classList.toggle("sidebar-collapsed");
});

els.clearHistoryBtn.addEventListener("click", clearAllHistory);

els.exportBtn.addEventListener("click", openExportModal);
els.exportModalClose.addEventListener("click", closeExportModal);
els.exportModalOverlay.addEventListener("click", (e) => {
  if (e.target === els.exportModalOverlay) closeExportModal();
});
els.exportPdfBtn.addEventListener("click", exportPdf);
els.exportPngBtn.addEventListener("click", exportPng);
els.exportTitleInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); exportPdf(); }
  else if (e.key === "Escape") { e.preventDefault(); closeExportModal(); }
});

[els.original, els.modified].forEach((t) => {
  t.addEventListener("input", updateBadge);
  // Tab inserts spaces inside textareas.
  t.addEventListener("keydown", (e) => {
    if (e.key === "Tab" && !e.shiftKey) {
      e.preventDefault();
      const start = t.selectionStart;
      const end = t.selectionEnd;
      t.value = t.value.substring(0, start) + "  " + t.value.substring(end);
      t.selectionStart = t.selectionEnd = start + 2;
    }
  });
});

// Keyboard shortcuts.
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && !els.exportModalOverlay.hidden) {
    e.preventDefault();
    closeExportModal();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
    e.preventDefault();
    doCompare();
  } else if ((e.ctrlKey || e.metaKey) && (e.key === "s" || e.key === "S")) {
    e.preventDefault();
    saveCurrent();
  }
});

updateBadge();
renderHistory();
</script>

</body>
</html>
